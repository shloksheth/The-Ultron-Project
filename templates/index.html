<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRON | DASHBOARD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <header>
            <div class="logo">U.L.T.R.O.N.</div>
            <div class="status">SYSTEM: <span id="sys-status" class="online">ONLINE</span></div>
        </header>
        
        <main>
            <div class="left-panel">
                <div class="card">
                    <h3>NEURAL FEED</h3>
                    <div id="logs" class="log-container">
                        <p class="dim">[SYSTEM] Initializing core components...</p>
                    </div>
                </div>
            </div>
            
            <div class="center-panel">
                <div class="arc-reactor">
                    <div class="ring outer"></div>
                    <div class="ring middle"></div>
                    <div class="ring inner"></div>
                    <div class="core"></div>
                </div>
                <div class="greeting">
                    <h1 id="greeting-text">SYSTEM STANDBY</h1>
                    <p id="clock">00:00:00</p>
                </div>
            </div>
            
            <div class="right-panel">
                <div class="card">
                    <h3>MINI COMPUTER</h3>
                    <div class="browser-preview">
                        <div id="browser-status">IDLE</div>
                        <img id="browser-shot" src="" style="display:none; width:100%;">
                    </div>
                </div>
                <div class="card">
                    <h3>STATS</h3>
                    <div class="stat-row">CPU: <span id="cpu-load">0%</span></div>
                    <div class="stat-row">MEM: <span id="mem-load">0%</span></div>
                </div>
            </div>
        </main>
        
        <footer>
            <div class="command-input">
                <span class="prompt">></span>
                <input type="text" id="user-input" placeholder="READY FOR COMMANDS...">
            </div>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
